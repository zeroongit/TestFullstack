version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: test_db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: test_logistics
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    container_name: test_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: test_logistics
      DB_USER: test_user
      DB_PASSWORD: password123  
      JWT_SECRET: TesTingFullStack321